services:
  - type: web
    name: myjnia-autoclean
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    envVars:
      - key: DATABASE_PATH
        value: /var/data/myjnia.sqlite
    disk:
      name: myjnia-data
      mountPath: /var/data
      sizeGB: 1
